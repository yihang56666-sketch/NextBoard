name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check tools/ tests/

      - name: Type check
        run: mypy tools/ --config-file mypy.ini

      - name: Unit tests
        run: pytest tests/ -v --basetemp=.tmp-pytest-ci

      - name: Butler validation
        run: python tests\validate_hardware_butler.py

      - name: Plugin package validation
        run: python plugins\hardware-development-butler\scripts\validate_package.py
