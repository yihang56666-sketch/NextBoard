name: Bug report
description: Report a reproducible problem in the CLI, GUI, docs, tests, or plugin.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, paths, and input files that matter.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output
      render: text
  - type: input
    id: version
    attributes:
      label: Python and OS
      placeholder: "Python 3.12 on Windows 11"
