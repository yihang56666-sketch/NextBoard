name: Feature request
description: Suggest a new workflow, integration, backend, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - GUI
        - embeddedskills backend
        - nextboard hardware design
        - documentation
        - plugin packaging
    validations:
      required: true
